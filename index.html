<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudhanshu Remote | Viva Edition</title>
    <!-- Optimized Socket.io loading -->
    <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #64748b;
            --bg: #0f172a; /* Modern Dark Theme Background */
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-success: #22c55e;
            --accent-error: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { 
            font-weight: 800; 
            font-size: 1.4rem; 
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--accent-error);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--accent-error);
        }

        .status-online .status-dot {
            background-color: var(--accent-success);
            box-shadow: 0 0 10px var(--accent-success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* LANDING PAGE */
        #landing-view { 
            max-width: 1100px;
            margin: 5rem auto;
            padding: 0 2rem;
        }

        .hero-section { text-align: center; margin-bottom: 4rem; }
        .hero-section h1 { 
            font-size: 3.5rem; 
            font-weight: 800;
            margin-bottom: 1rem; 
            letter-spacing: -1.5px;
        }
        .hero-section p { color: var(--text-muted); font-size: 1.2rem; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
            gap: 2.5rem; 
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 3rem 2rem; 
            border-radius: 24px; 
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(79, 70, 229, 0.4);
            box-shadow: 0 25px 30px -5px rgba(0, 0, 0, 0.4);
        }

        .card h2 { font-size: 1.75rem; margin-bottom: 1rem; }
        .card p { color: var(--text-muted); margin-bottom: 2rem; line-height: 1.6; }

        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--glass-border); 
            border-radius: 12px; 
            font-size: 1.2rem; 
            text-align: center;
            color: white;
            font-family: 'Monaco', 'Consolas', monospace;
            letter-spacing: 4px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.2);
        }

        button { 
            width: 100%; 
            padding: 16px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 1rem;
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px;
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
        }

        button:hover { 
            background: var(--primary-hover); 
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.23);
        }

        button:active { transform: scale(0.98); }

        .btn-outline { 
            background: transparent; 
            border: 2px solid var(--glass-border); 
            color: var(--text-main); 
            margin-top: 15px;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-main);
        }

        #access-code-container { 
            margin-top: 2rem; 
            padding: 2rem; 
            background: rgba(34, 197, 94, 0.1); 
            border: 1px dashed var(--accent-success);
            border-radius: 16px; 
            display: none; 
            flex-direction: column; 
            align-items: center;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #access-code-display { 
            font-family: 'Monaco', 'Consolas', monospace;
            font-weight: 800; 
            font-size: 2.5rem; 
            color: var(--accent-success); 
            letter-spacing: 8px;
            margin: 10px 0;
        }

        /* VIEWER PAGE */
        #viewer-view { 
            display: none; 
            background: #000; 
            height: 100vh; 
            width: 100vw; 
            position: fixed;
            top: 0; left: 0;
            z-index: 1000;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        #screen { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            cursor: crosshair;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .toolbar {
            position: fixed; 
            bottom: 30px; 
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: white; 
            padding: 12px 24px; 
            border-radius: 100px; 
            display: flex; 
            align-items: center;
            gap: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #stats { font-size: 0.9rem; color: var(--text-muted); }

        #exit-btn { 
            background: var(--accent-error); 
            border: none; 
            color: white; 
            padding: 8px 20px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600;
            width: auto;
        }

        #exit-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Zippy</div>
        <div id="connection-status">
            <span class="status-dot"></span>
            <span id="status-text">System Offline</span>
        </div>
    </nav>

    <div id="landing-view">
        <div class="hero-section">
            <h1>Remote Control System </h1>
           
        </div>

        <div class="grid">
            <!-- HOST CARD -->
            <div class="card">
                <div style="font-size: 3rem; margin-bottom: 1rem;">💻</div>
                <h2>Host Session</h2>
                <p>Allow someone to view and control this computer by generating a secure key.</p>
                <button onclick="createMeeting()">Generate Access Code</button>
                
                <div id="access-code-container">
                    <small style="color: var(--accent-success); text-transform: uppercase; letter-spacing: 1px;">Ready to connect</small>
                    <div id="access-code-display">------</div>
                    <button class="btn-outline" onclick="copyCode()">Copy to Clipboard</button>
                </div>
            </div>

            <!-- CLIENT CARD -->
            <div class="card">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🎮</div>
                <h2>Remote Control</h2>
                <p>Enter the 6-digit access code provided by the host to begin the session.</p>
                <input id="roomInput" type="text" placeholder="000000" maxlength="6">
                <button onclick="joinMeetingUI()" style="background: linear-gradient(135deg, var(--primary), #818cf8);">Connect to Node</button>
            </div>
        </div>
    </div>

    <!-- STREAM VIEWER -->
    <div id="viewer-view">
        <img id="screen" alt="Remote Stream">
        <div class="toolbar">
            <span id="stats">● Session Encrypted — Latency: 24ms</span>
            <button id="exit-btn" onclick="location.reload()">Terminate Session</button>
        </div>
    </div>
</body>

    <script>
        // Connects to the IP in the URL bar (e.g., http://192.168.1.4:3000)
        const socket = io();

        const landingView = document.getElementById("landing-view");
        const viewerView = document.getElementById("viewer-view");
        const screen = document.getElementById("screen");
        const stats = document.getElementById("stats");
        const statusDot = document.getElementById("connection-status");
        
        let currentRoom = null;
        let isViewing = false;

        socket.on('connect', () => {
            statusDot.innerText = "● Online";
            statusDot.style.color = "#22c55e";
        });

        socket.on('disconnect', () => {
            statusDot.innerText = "● Offline";
            statusDot.style.color = "#ef4444";
        });

        // HOST LOGIC
        function createMeeting() {
            // Step 1: Download agent.exe from your server
            window.location.href = '/download-agent'; 
            // Step 2: Request meeting ID
            socket.emit("create-meeting");
        }

        socket.on("meeting-created", (id) => {
            document.getElementById("access-code-container").style.display = "flex";
            document.getElementById("access-code-display").innerText = id;
            currentRoom = id;
        });

        function copyCode() {
            const code = document.getElementById("access-code-display").innerText;
            navigator.clipboard.writeText(code);
            alert("Code copied!");
        }

        // VIEWER LOGIC
        function joinMeetingUI() {
            const room = document.getElementById("roomInput").value.trim();
            if (room.length === 6) {
                currentRoom = room;
                isViewing = true;
                landingView.style.display = "none";
                viewerView.style.display = "flex";
                socket.emit("join-meeting", room);
            } else {
                alert("Please enter a 6-digit code");
            }
        }

        socket.on("screen-data", (data) => {
            if (!isViewing) return;
            // High-speed update for screen
            screen.src = "data:image/jpeg;base64," + data.image;
            if(data.stats) {
                stats.innerText = `CPU: ${data.stats.cpu}% | RAM: ${data.stats.ram}%`;
            }
        });

        // INPUT CONTROL LOGIC
        function sendMouse(e, type) {
            if (!isViewing || !currentRoom) return;
            const rect = screen.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.emit("mouse-event", { room: currentRoom, type, x, y });
        }

        screen.addEventListener("mousemove", (e) => sendMouse(e, "move"));
        screen.addEventListener("mousedown", (e) => sendMouse(e, "mousedown"));
        screen.addEventListener("mouseup", (e) => sendMouse(e, "mouseup"));
        screen.addEventListener("contextmenu", (e) => e.preventDefault());

        window.addEventListener("keydown", (e) => {
            if (!isViewing) return;
            // Prevent browser scroll keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
            socket.emit("keyboard-event", { room: currentRoom, type: "down", key: e.key });
        });

        window.addEventListener("keyup", (e) => {
            if (!isViewing) return;
            socket.emit("keyboard-event", { room: currentRoom, type: "up", key: e.key });
        });

    </script>
</body>
</html>
