<!DOCTYPE html>
<html>
<head>
    <title>Remote Viewer</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #screen { width: 100%; height: 100%; object-fit: contain; cursor: none; }
        #stats { position: fixed; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.7); padding: 5px 10px; font-family: monospace; pointer-events: none; }
    </style>
</head>
<body>
    <div id="stats">Connecting...</div>
    <img id="screen">

    <script>
        const params = new URLSearchParams(window.location.search);
        const room = params.get("room");
        const socket = io("http://192.168.1.4:3000");
        
        const screen = document.getElementById("screen");
        const stats = document.getElementById("stats");

        socket.emit("join-meeting", room);

        socket.on("screen-data", (data) => {
            screen.src = "data:image/jpeg;base64," + data.image;
            stats.innerText = `CPU: ${data.stats.cpu}% | RAM: ${data.stats.ram}%`;
        });

        function sendMouse(e, type) {
            const rect = screen.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.emit("mouse-event", { room, type, x, y });
        }

        screen.addEventListener("mousemove", (e) => sendMouse(e, "move"));
        screen.addEventListener("mousedown", (e) => sendMouse(e, "mousedown"));
        screen.addEventListener("mouseup", (e) => sendMouse(e, "mouseup"));
        screen.addEventListener("contextmenu", (e) => e.preventDefault());

        window.addEventListener("keydown", (e) => {
            socket.emit("keyboard-event", { room, type: "down", key: e.key });
        });
        window.addEventListener("keyup", (e) => {
            socket.emit("keyboard-event", { room, type: "up", key: e.key });
        });
    </script>
</body>
</html>
